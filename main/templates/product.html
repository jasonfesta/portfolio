<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{project.title}} - {{site.title}}</title>
    <meta name="description" content="{{project.summary}}" />
    <link rel="stylesheet" href="/pages/products/_product.css?v=3" />
  </head>
  <body class="project-page project-page--product">
    <header class="reader-hero reader-hero--video">
      <video autoplay muted loop playsinline preload="auto">
        <source src="{{project.main_video}}" type="{{project.main_video_type}}" />
      </video>
    </header>

    <main class="reader-wrap">
      <a class="reader-back" href="/home.html">&#8592; Back to home</a>
      <h1 class="reader-title">{{project.title}}</h1>
      <p class="reader-subtitle">{{project.subtitle}}</p>
      <span class="product-pill">Project</span>
      <hr class="reader-rule" />

      <article class="reader-body darwin-sections">
        {{project.all_text}}
        {{project.style_media_area}}
        {{project.design_media_area}}
        {{project.channels}}
        {{project.system_media_area}}
        {{project.team}}
      </article>
    </main>
  </body>
</html>
